name: Deploiement automatique

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
      APP_DIR: ${{ secrets.APP_DIR }}
      DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH || github.ref_name }}
      RUN_DISCORD_DEPLOY: ${{ vars.RUN_DISCORD_DEPLOY || '1' }}

    steps:
      - name: Verifier la configuration
        run: |
          [ -n "$SSH_HOST" ] || { echo "::error::Secret SSH_HOST manquant"; exit 1; }
          [ -n "$SSH_USER" ] || { echo "::error::Secret SSH_USER manquant"; exit 1; }
          [ -n "$APP_DIR" ] || { echo "::error::Secret APP_DIR manquant"; exit 1; }
          [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ] || { echo "::error::Secret SSH_PRIVATE_KEY manquant"; exit 1; }

      - name: Configurer la cle SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deployer sur le serveur
        run: |
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -se' <<EOF
          set -euo pipefail
          cd "$APP_DIR"

          if [ ! -d .git ]; then
            echo "ERREUR: APP_DIR doit contenir un depot git initialise."
            exit 1
          fi

          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git pull --ff-only origin "$DEPLOY_BRANCH"

          npm ci --omit=dev

          if [ "$RUN_DISCORD_DEPLOY" = "1" ]; then
            npm run deploy
          fi

          pm2 startOrReload ecosystem.config.cjs --env production
          pm2 save
          EOF
